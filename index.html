<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小T摸鱼大冒险</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fef6e4; --card: #fffaf0; --primary: #f582ae;
    --secondary: #8bd3dd; --accent: #f3d2c1; --dark: #001858;
    --purple: #a78bfa; --shadow: rgba(0,24,88,.15);
  }
  body {
    font-family: 'PingFang SC', -apple-system, sans-serif;
    background:
      radial-gradient(circle at 10% 20%, #ffd6e0 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, #c8e6f5 0%, transparent 50%), var(--bg);
    color: var(--dark); min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .game-container {
    width: 1000px; max-width: 100%; background: var(--card);
    border-radius: 24px; box-shadow: 0 20px 60px var(--shadow);
    overflow: hidden; border: 3px solid var(--dark);
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 22px;
    background: linear-gradient(90deg, var(--purple), var(--primary));
    color: #fff; border-bottom: 3px solid var(--dark);
    gap: 12px;
    flex-wrap: nowrap;
  }
  .title-block {
    display: flex; flex-direction: column;
    flex-shrink: 0;
    min-width: 0;
  }
  .title {
    font-size: 22px; font-weight: 800;
    text-shadow: 1px 1px 0 var(--dark);
    white-space: nowrap;
    line-height: 1.1;
  }
  .title-sub {
    display: inline-flex; align-items: center;
    font-size: 11px; font-weight: 600;
    background: rgba(255,255,255,.25);
    padding: 2px 10px; border-radius: 12px;
    margin-top: 4px; white-space: nowrap;
    border: 1.5px solid rgba(255,255,255,.4);
    align-self: flex-start;
  }
  .stats { display: flex; gap: 8px; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .stat {
    background: var(--card); color: var(--dark);
    padding: 5px 10px; border-radius: 16px;
    border: 2px solid var(--dark);
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
  }
  .stat .lbl { font-size: 10px; opacity: .55; font-weight: 600; }
  .stat b { color: var(--primary); font-size: 14px; }
  .stat .unit { font-size: 9px; opacity: .55; font-weight: 600; }

  .scene {
    position: relative; height: 460px; overflow: hidden;
    background: linear-gradient(180deg, #87ceeb 0%, #c8e6f5 50%, #d4e8c5 100%);
  }
  .parallax-layer { position: absolute; pointer-events: none; width: 200%; left: 0; }
  /* 各层的高度和位置全部精确控制，避免遮挡顶部 UI */
  .layer-clouds { z-index: 2; top: 0; height: 130px; }
  .layer-far    { z-index: 3; bottom: 90px; height: 200px; }
  .layer-mid    { z-index: 4; bottom: 88px; height: 240px; }
  .layer-near   { z-index: 5; bottom: 88px; height: 130px; }
  .layer-road   { z-index: 6; bottom: 0; height: 90px; }
  .layer-front  { z-index: 7; bottom: 78px; height: 40px; }
  @keyframes scroll {
    from { transform: translateX(0); } to { transform: translateX(-50%); }
  }
  .layer-clouds { animation: scroll 80s linear infinite; }
  .driving .layer-clouds { animation: scroll 30s linear infinite; }
  .driving .layer-far { animation: scroll 18s linear infinite; }
  .driving .layer-mid { animation: scroll 14s linear infinite; }
  .driving .layer-near { animation: scroll 4s linear infinite; }
  .driving .layer-road { animation: scroll 1s linear infinite; }
  .driving .layer-front { animation: scroll 2.5s linear infinite; }

  .hero-car {
    position: absolute; left: 50%; bottom: 45px;
    transform: translateX(-50%); z-index: 8;
    width: 240px; transition: transform .3s;
  }
  .driving .hero-car { animation: bump .3s linear infinite; }
  @keyframes bump {
    0%, 100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -3px); }
  }
  /* 小T 头部叠在车上 */
  .hero-car-wrap { position: relative; width: 100%; }
  .hero-car-svg { width: 100%; display: block; }
  .hero-tina-head {
    position: absolute;
    top: 4%;
    left: 50%;
    transform: translateX(-50%);
    width: 78px; height: 78px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #001858;
    box-shadow: 2px 2px 0 #001858;
    z-index: 2;
    background: #fdf6e8;
  }
  .driving .hero-tina-head {
    animation: tHeadSway 1.4s ease-in-out infinite;
  }
  .hero-tina-head img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: center 30%;
    display: block;
  }
  @keyframes tHeadSway {
    0%, 100% { transform: translateX(-50%) rotate(-5deg); }
    50% { transform: translateX(-50%) rotate(5deg); }
  }

  .compass {
    position: absolute; top: 16px; right: 16px;
    width: 100px; height: 100px; background: var(--card);
    border: 3px solid var(--dark); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 4px 0 var(--dark); z-index: 20;
  }
  .compass.shake { animation: shake .4s; }
  .compass.red { background: #ffe0e0; border-color: #d63d4f; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-6px) rotate(-5deg); }
    75% { transform: translateX(6px) rotate(5deg); }
  }
  .compass-marks { position: absolute; inset: 6px; }
  .compass-letter { position: absolute; font-size: 11px; font-weight: 800; }
  .c-n { top: 4px; left: 50%; transform: translateX(-50%); color: var(--primary); }
  .c-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .c-e { right: 6px; top: 50%; transform: translateY(-50%); }
  .c-w { left: 6px; top: 50%; transform: translateY(-50%); }
  .needle {
    width: 4px; height: 70%;
    background: linear-gradient(to bottom, var(--primary) 0%, var(--primary) 50%, var(--dark) 50%, var(--dark) 100%);
    border-radius: 2px; transform-origin: 50% 50%;
    transition: transform .5s cubic-bezier(.4,2,.5,1);
  }
  .compass-label {
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 700; white-space: nowrap;
    background: var(--dark); color: var(--card);
    padding: 2px 10px; border-radius: 10px;
  }

  .progress-wrap {
    position: absolute; top: 16px; left: 16px;
    background: var(--card); border: 3px solid var(--dark);
    border-radius: 14px; padding: 10px 14px;
    box-shadow: 4px 4px 0 var(--dark); max-width: 280px; z-index: 20;
  }
  .progress-title { font-size: 12px; font-weight: 800; margin-bottom: 6px; }
  .progress-track { display: flex; gap: 4px; align-items: center; }
  .pnode {
    width: 28px; height: 8px; background: var(--accent);
    border-radius: 4px; border: 2px solid var(--dark);
  }
  .pnode.done { background: #06d6a0; }
  .pnode.active { background: #ffd166; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 #ffd166; }
    50% { box-shadow: 0 0 0 4px rgba(255,209,102,.3); }
  }
  .progress-text { font-size: 11px; opacity: .7; margin-top: 4px; }

  .landmark-hint {
    position: absolute; top: 130px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--card); border: 2.5px solid var(--dark);
    border-radius: 20px; padding: 8px 18px;
    font-size: 13px; font-weight: 800;
    box-shadow: 3px 3px 0 var(--dark);
    z-index: 15; opacity: 0;
    transition: all .4s cubic-bezier(.4,1.6,.5,1);
    pointer-events: none;
  }
  .landmark-hint.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .landmark-hint .emoji { margin-right: 6px; }

  .obstacle-banner {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(.5);
    background: var(--primary); color: var(--card);
    padding: 14px 28px; border-radius: 30px;
    border: 3px solid var(--dark); box-shadow: 4px 4px 0 var(--dark);
    font-size: 16px; font-weight: 800;
    pointer-events: none; opacity: 0;
    transition: all .4s cubic-bezier(.4,1.6,.5,1); z-index: 25;
  }
  .obstacle-banner.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

  .node-card {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(.5);
    background: var(--card); border: 3px solid var(--dark);
    border-radius: 18px; padding: 18px 30px;
    box-shadow: 6px 6px 0 var(--dark);
    text-align: center; z-index: 22;
    opacity: 0; pointer-events: none;
    transition: all .3s cubic-bezier(.4,1.6,.5,1);
  }
  .node-card.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  .node-card .marker { font-size: 30px; margin-bottom: 6px; }
  .node-card .name { font-size: 17px; font-weight: 800; margin-bottom: 2px; }
  .node-card .label { font-size: 11px; opacity: .6; }

  .choice-area {
    padding: 18px 22px; background: var(--card);
    border-top: 3px solid var(--dark);
  }
  .choice-question {
    text-align: center; font-size: 16px; font-weight: 700;
    margin-bottom: 12px; line-height: 1.5;
  }
  .choice-question .where {
    display: inline-block; background: var(--secondary); color: var(--dark);
    padding: 3px 12px; border-radius: 16px;
    border: 2px solid var(--dark); font-size: 13px; margin-bottom: 6px;
  }
  .choice-buttons {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
  }
  .choice-btn {
    flex: 1; min-width: 180px; max-width: 240px; padding: 14px 16px;
    background: var(--card); border: 3px solid var(--dark);
    border-radius: 14px; color: var(--dark);
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all .15s;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 4px 4px 0 var(--dark); font-family: inherit;
  }
  .choice-btn:hover:not(:disabled) {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--dark); background: var(--accent);
  }
  .choice-btn:active:not(:disabled) {
    transform: translate(2px, 2px); box-shadow: 0 0 0 var(--dark);
  }
  .choice-btn:disabled { opacity: .5; cursor: not-allowed; }
  .choice-btn .arrow {
    font-size: 26px; flex-shrink: 0; background: var(--secondary);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; border: 2px solid var(--dark);
  }
  .choice-btn .info { display: flex; flex-direction: column; align-items: flex-start; flex: 1; justify-content: center; }
  .choice-btn .label-text { font-size: 15px; font-weight: 800; }

  .modal {
    position: fixed; inset: 0; background: rgba(0,24,88,.5);
    display: none; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--card); border: 3px solid var(--dark);
    border-radius: 20px; padding: 26px 30px;
    max-width: 460px; width: 100%;
    text-align: center; box-shadow: 8px 8px 0 var(--dark);
    animation: pop .4s cubic-bezier(.4,1.8,.5,1);
  }
  @keyframes pop {
    from { transform: scale(.5) rotate(-5deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }
  .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .modal-text { font-size: 14px; line-height: 1.7; margin-bottom: 20px; opacity: .85; }
  .modal-btn {
    padding: 12px 30px; background: var(--primary); color: var(--card);
    border: 3px solid var(--dark); border-radius: 30px;
    font-size: 14px; font-weight: 800; cursor: pointer;
    box-shadow: 4px 4px 0 var(--dark); font-family: inherit;
    transition: all .15s;
  }
  .modal-btn:hover {
    transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--dark);
  }

  .footer-tip {
    text-align: center; padding: 10px;
    font-size: 12px; opacity: .6;
    background: var(--accent); font-weight: 600;
  }

  .rain-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(100,120,150,.3) 0%, rgba(100,120,150,.5) 100%);
    pointer-events: none; z-index: 18;
    opacity: 0; transition: opacity .5s;
  }
  .rain-overlay.show { opacity: 1; }
  .raindrop {
    position: absolute; width: 2px; height: 14px;
    background: linear-gradient(to bottom, transparent, #aac5ff);
    animation: rainfall 0.6s linear infinite;
  }
  @keyframes rainfall {
    from { transform: translateY(-20px); }
    to { transform: translateY(460px); }
  }

  /* ====== 打卡特写 ====== */
  .checkin {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 30;
    pointer-events: none;
    opacity: 0;
    transition: opacity .35s;
  }
  .checkin.show { opacity: 1; }
  .checkin-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(255,250,240,.4) 0%, rgba(0,24,88,.6) 100%);
    backdrop-filter: blur(2px);
  }
  .checkin-frame {
    position: relative;
    background: var(--card);
    border: 4px solid var(--dark);
    border-radius: 18px;
    padding: 14px;
    box-shadow: 8px 8px 0 var(--dark);
    transform: scale(.6) rotate(-3deg);
    transition: transform .5s cubic-bezier(.4,1.8,.5,1);
    width: 360px;
  }
  .checkin.show .checkin-frame {
    transform: scale(1) rotate(-2deg);
  }
  .checkin-photo {
    position: relative;
    width: 100%; height: 200px;
    background: linear-gradient(180deg, #87ceeb 0%, #c8e6f5 60%, #d4e8c5 100%);
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid var(--dark);
  }
  .checkin-landmark {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%) scale(0);
    transition: transform .6s cubic-bezier(.4,1.6,.5,1) .1s;
  }
  .checkin.show .checkin-landmark {
    transform: translateX(-50%) scale(1.2);
  }
  .checkin-tgirl {
    position: absolute;
    bottom: 0; right: 14px;
    transform: translateY(80px) rotate(15deg);
    transition: transform .5s cubic-bezier(.4,1.8,.5,1) .25s;
    width: 110px;
    height: 170px;
    overflow: hidden;
    border-radius: 8px 8px 0 0;
  }
  .checkin.show .checkin-tgirl {
    transform: translateY(0) rotate(0deg);
  }
  .checkin-tgirl img {
    width: 100%; height: 100%; object-fit: cover;
    object-position: center top;
    display: block;
  }
  .checkin-flash {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
  }
  .checkin.show .checkin-flash {
    animation: flash .5s ease-out;
  }
  @keyframes flash {
    0%   { opacity: 0; }
    10%  { opacity: 1; }
    100% { opacity: 0; }
  }
  .checkin-title {
    text-align: center;
    font-size: 16px;
    font-weight: 800;
    margin-top: 12px;
    color: var(--dark);
  }
  .checkin-title .stamp {
    display: inline-block;
    background: #d63d4f;
    color: #fff;
    padding: 2px 10px;
    border-radius: 14px;
    border: 2px solid var(--dark);
    margin-right: 6px;
    font-size: 13px;
    transform: rotate(-6deg);
  }
  .checkin-stars {
    position: absolute;
    top: 6px; right: 8px;
    font-size: 14px;
    animation: spin 2s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0); }
    to { transform: rotate(360deg); }
  }

  .sun {
    position: absolute; top: 30px; left: 50%; margin-left: -25px;
    width: 50px; height: 50px;
    background: radial-gradient(circle, #fff5cc 0%, #ffd166 70%);
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,209,102,.6);
    z-index: 1;
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="topbar">
    <div class="title-block">
      <div class="title">🚗 小T摸鱼大冒险</div>
      <div class="title-sub">📍 目的地：亚洲金融大厦</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="lbl">里程</span><b id="distance">0.0</b><span class="unit">km</span></div>
      <div class="stat"><span class="lbl">时速</span><b id="speed">0</b><span class="unit">km/h</span></div>
    </div>
  </div>

  <div class="scene" id="scene">
    <div class="sun"></div>
    <div class="parallax-layer layer-clouds" id="layer-clouds"></div>
    <div class="parallax-layer layer-far" id="layer-far"></div>
    <div class="parallax-layer layer-mid" id="layer-mid"></div>
    <div class="parallax-layer layer-near" id="layer-near"></div>
    <div class="parallax-layer layer-road" id="layer-road"></div>
    <div class="parallax-layer layer-front" id="layer-front"></div>
    <div class="rain-overlay" id="rainOverlay"></div>
    <div class="hero-car" id="heroCar"></div>

    <!-- 打卡特写 -->
    <div class="checkin" id="checkin">
      <div class="checkin-bg"></div>
      <div class="checkin-frame">
        <div class="checkin-photo">
          <div class="checkin-stars">✨</div>
          <div class="checkin-landmark" id="checkinLandmark"></div>
          <div class="checkin-tgirl" id="checkinTgirl"></div>
          <div class="checkin-flash"></div>
        </div>
        <div class="checkin-title" id="checkinTitle"></div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-title">🗺️ 路线进度</div>
      <div class="progress-track" id="progress"></div>
      <div class="progress-text" id="progressText">出发：腾讯北京总部</div>
    </div>

    <div class="compass" id="compass">
      <div class="compass-marks">
        <span class="compass-letter c-n">N</span>
        <span class="compass-letter c-s">S</span>
        <span class="compass-letter c-e">E</span>
        <span class="compass-letter c-w">W</span>
      </div>
      <div class="needle" id="needle"></div>
    </div>

    <div class="landmark-hint" id="landmarkHint"></div>
    <div class="obstacle-banner" id="obstacle"></div>
    <div class="node-card" id="nodeCard"></div>
  </div>

  <div class="choice-area">
    <div class="choice-question" id="choiceQ"></div>
    <div class="choice-buttons" id="choiceBtns"></div>
  </div>

</div>

<div class="modal" id="modal">
  <div class="modal-card" id="modalCard"></div>
</div>

<script src="game-logic.js"></script>
</body>
</html>
