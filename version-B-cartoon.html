<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小T送达记 · B版 卡通插画</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fef6e4;
    --card: #fffaf0;
    --primary: #f582ae;
    --secondary: #8bd3dd;
    --accent: #f3d2c1;
    --dark: #001858;
    --shadow: rgba(0,24,88,.15);
  }
  body {
    font-family: 'PingFang SC', -apple-system, sans-serif;
    background:
      radial-gradient(circle at 10% 20%, #ffd6e0 0%, transparent 50%),
      radial-gradient(circle at 90% 80%, #c8e6f5 0%, transparent 50%),
      var(--bg);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .game-container {
    width: 980px;
    max-width: 100%;
    background: var(--card);
    border-radius: 24px;
    box-shadow: 0 20px 60px var(--shadow);
    overflow: hidden;
    border: 3px solid var(--dark);
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 24px;
    background: var(--primary);
    color: var(--dark);
    border-bottom: 3px solid var(--dark);
  }
  .title { font-size: 20px; font-weight: 800; }
  .title .sub { font-size: 12px; opacity: .7; margin-left: 8px; font-weight: 500; }
  .stats { display: flex; gap: 12px; font-size: 13px; font-weight: 700; }
  .stat {
    background: var(--card);
    padding: 6px 14px;
    border-radius: 20px;
    border: 2px solid var(--dark);
  }
  .stat b { color: var(--primary); }

  .scene {
    position: relative;
    height: 420px;
    background:
      linear-gradient(180deg, #c8e6f5 0%, #fef6e4 70%, #d4e8c5 100%);
    overflow: hidden;
  }
  /* 场景插画区 */
  .illust-area {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .illust-svg {
    width: 100%;
    height: 100%;
  }

  /* 罗盘 */
  .compass {
    position: absolute;
    top: 16px; right: 16px;
    width: 100px; height: 100px;
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 4px 4px 0 var(--dark);
  }
  .compass.shake { animation: shake .4s; }
  .compass.red { background: #ffe0e0; border-color: #d63d4f; }
  @keyframes shake {
    0%,100% { transform: translateX(0) rotate(0); }
    25% { transform: translateX(-6px) rotate(-5deg); }
    75% { transform: translateX(6px) rotate(5deg); }
  }
  .compass-marks { position: absolute; inset: 6px; }
  .compass-letter { position: absolute; font-size: 11px; font-weight: 800; }
  .c-n { top: 4px; left: 50%; transform: translateX(-50%); color: var(--primary); }
  .c-s { bottom: 4px; left: 50%; transform: translateX(-50%); }
  .c-e { right: 6px; top: 50%; transform: translateY(-50%); }
  .c-w { left: 6px; top: 50%; transform: translateY(-50%); }
  .needle {
    width: 4px; height: 70%;
    background: linear-gradient(to bottom, var(--primary) 0%, var(--primary) 50%, var(--dark) 50%, var(--dark) 100%);
    border-radius: 2px;
    transform-origin: 50% 50%;
    transition: transform .5s cubic-bezier(.4,2,.5,1);
  }
  .compass-label {
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 700; white-space: nowrap;
    background: var(--dark); color: var(--card);
    padding: 2px 10px; border-radius: 10px;
  }

  /* 路线进度 */
  .progress-wrap {
    position: absolute;
    top: 16px; left: 16px;
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 14px;
    padding: 10px 14px;
    box-shadow: 4px 4px 0 var(--dark);
    max-width: 280px;
  }
  .progress-title { font-size: 12px; font-weight: 800; margin-bottom: 6px; }
  .progress-track { display: flex; gap: 4px; align-items: center; }
  .pnode {
    width: 28px; height: 8px; background: var(--accent); border-radius: 4px;
    border: 2px solid var(--dark);
  }
  .pnode.done { background: #06d6a0; }
  .pnode.active { background: #ffd166; animation: pulse 1s infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 #ffd166; }
    50% { box-shadow: 0 0 0 4px rgba(255,209,102,.3); }
  }
  .progress-text { font-size: 11px; opacity: .7; margin-top: 4px; }

  /* 选项区 */
  .choice-area {
    padding: 20px 24px;
    background: var(--card);
    border-top: 3px solid var(--dark);
  }
  .choice-question {
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .choice-question .where {
    display: inline-block;
    background: var(--secondary);
    color: var(--dark);
    padding: 3px 12px;
    border-radius: 16px;
    border: 2px solid var(--dark);
    font-size: 13px;
    margin-bottom: 6px;
  }
  .choice-buttons {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .choice-btn {
    flex: 1;
    min-width: 180px;
    max-width: 240px;
    padding: 14px 16px;
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 14px;
    color: var(--dark);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 4px 4px 0 var(--dark);
    font-family: inherit;
  }
  .choice-btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 var(--dark);
    background: var(--accent);
  }
  .choice-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 0 0 0 var(--dark);
  }
  .choice-btn .arrow {
    font-size: 28px;
    flex-shrink: 0;
    background: var(--secondary);
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    border: 2px solid var(--dark);
  }
  .choice-btn .info { display: flex; flex-direction: column; align-items: flex-start; flex: 1; }
  .choice-btn .label-text { font-size: 14px; font-weight: 800; }
  .choice-btn .desc { font-size: 11px; opacity: .7; font-weight: 500; }

  /* 路障 banner */
  .obstacle-banner {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(.5);
    background: var(--primary);
    color: var(--card);
    padding: 14px 28px;
    border-radius: 30px;
    border: 3px solid var(--dark);
    box-shadow: 4px 4px 0 var(--dark);
    font-size: 16px;
    font-weight: 800;
    pointer-events: none;
    opacity: 0;
    transition: all .4s cubic-bezier(.4,1.6,.5,1);
    z-index: 5;
  }
  .obstacle-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  /* 弹窗 */
  .modal {
    position: fixed; inset: 0;
    background: rgba(0,24,88,.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal.show { display: flex; }
  .modal-card {
    background: var(--card);
    border: 3px solid var(--dark);
    border-radius: 20px;
    padding: 30px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 8px 8px 0 var(--dark);
    animation: pop .4s cubic-bezier(.4,1.8,.5,1);
  }
  @keyframes pop {
    from { transform: scale(.5) rotate(-5deg); opacity: 0; }
    to { transform: scale(1) rotate(0); opacity: 1; }
  }
  .modal-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
  .modal-text { font-size: 14px; line-height: 1.7; margin-bottom: 20px; opacity: .8; }
  .modal-btn {
    padding: 12px 30px;
    background: var(--primary);
    color: var(--card);
    border: 3px solid var(--dark);
    border-radius: 30px;
    font-size: 14px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--dark);
    font-family: inherit;
    transition: all .15s;
  }
  .modal-btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 6px 6px 0 var(--dark);
  }

  .footer-tip {
    text-align: center;
    padding: 12px;
    font-size: 12px;
    opacity: .6;
    background: var(--accent);
    font-weight: 600;
  }
</style>
</head>

  <div class="choice-area">

<!-- 弹窗 -->
<div class="modal" id="modal">

}

function compassFlash(red = false) {
  const c = document.getElementById('compass');
  c.classList.add('shake');
  if (red) c.classList.add('red');
  setTimeout(() => c.classList.remove('shake', 'red'), 600);
}

/* =========== UI =========== */
function renderProgress() {
  const wrap = document.getElementById('progress');
  wrap.innerHTML = '';
  for (let i = 0; i < ROUTE.length - 1; i++) {
    const d = document.createElement('div');
    d.className = 'pnode' + (i < stageIdx ? ' done' : i === stageIdx ? ' active' : '');
    wrap.appendChild(d);
  }
  document.getElementById('progressText').textContent = `当前：${ROUTE[stageIdx].name}`;
  document.getElementById('stage').textContent = `${Math.min(stageIdx + 1, ROUTE.length)}/${ROUTE.length}`;
}

function renderScene() {
  document.getElementById('illust').innerHTML = illustSvg(ROUTE[stageIdx].icon);
}

function showObstacle(text) {
  const el = document.getElementById('obstacle');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function showChoice() {
  const node = ROUTE[stageIdx];
  if (!node.question) return;
  document.getElementById('choiceQ').innerHTML =
    `<span class="where">📍 ${node.name}</span><br>${node.question}`;
  const btns = document.getElementById('choiceBtns');
  btns.innerHTML = '';
  // 找到正确选项指引罗盘
  const correctOpt = node.options.find(o => o.correct);
  if (correctOpt) updateCompass(correctOpt.angle);

  node.options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'choice-btn';
    const arrows = { N: '⬆️', S: '⬇️', E: '➡️', W: '⬅️' };
    b.innerHTML = `
      <span class="arrow">${arrows[opt.dir] || '🔄'}</span>
      <span class="info">
        <span class="label-text">${opt.label}</span>
        <span class="desc">${opt.desc}</span>
      </span>`;
    b.onclick = () => handleChoice(opt);
    btns.appendChild(b);
  });
}

function handleChoice(opt) {
  if (!opt.correct) {
    compassFlash(true);
    setTimeout(showLostModal, 300);
    return;
  }
  // 走对：禁用按钮 + 路障动画 + 进入下一关
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  showObstacle(ROUTE[stageIdx + 1] ? ROUTE[stageIdx + 1].obstacle : '🎉 抵达终点！');
  setTimeout(() => {
    stageIdx++;
    distance += [2.0, 2.4, 1.8, 2.6, 2.5, 2.4, 2.3][stageIdx - 1] || 2.0;
    document.getElementById('distance').textContent = distance.toFixed(1);
    renderProgress();
    renderScene();
    if (stageIdx >= ROUTE.length - 1) {
      setTimeout(showWinModal, 800);
    } else {
      setTimeout(showChoice, 600);
    }
  }, 1200);
}

function showLostModal() {
  document.getElementById('modalCard').innerHTML = `
    <div style="margin-bottom:14px;">${girlLCryingSvg()}</div>
    <div class="modal-title">😢 小L 哭哭了</div>
    <div class="modal-text">"小T~ 你走错路啦…<br>迷路了，找不到我喽……<br>快看看罗盘重新选！"</div>
    <button class="modal-btn" onclick="closeModal()">重新选择 →</button>
  `;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
}

function showWinModal() {
  document.getElementById('modalCard').innerHTML = `
    <div style="margin-bottom:14px;">${selfieSvg()}</div>
    <div class="modal-title">🎉 通关！合影留念</div>
    <div class="modal-text">小T 终于到了亚洲金融大厦<br>和小L来了个超棒的合影 📸<br>
    总里程 <b>${distance.toFixed(1)} km</b> · 一路顺风！</div>
    <button class="modal-btn" onclick="restart()">再玩一次 🔁</button>
  `;
  document.getElementById('modal').classList.add('show');
}

function restart() {
  stageIdx = 0;
  distance = 0;
  document.getElementById('distance').textContent = '0.0';
  document.getElementById('modal').classList.remove('show');
  renderProgress();
  renderScene();
  setTimeout(showChoice, 400);
}

/* =========== 启动 =========== */
function init() {
  renderProgress();
  renderScene();
  setTimeout(showChoice, 500);
}
init();
</script>
</body>
</html>
